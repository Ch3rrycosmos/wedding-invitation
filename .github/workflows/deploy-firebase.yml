name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # ---- Couple ----
          NEXT_PUBLIC_BRIDE_NAME: ${{ vars.NEXT_PUBLIC_BRIDE_NAME }}
          NEXT_PUBLIC_GROOM_NAME: ${{ vars.NEXT_PUBLIC_GROOM_NAME }}
          NEXT_PUBLIC_COUPLE_MONOGRAM: ${{ vars.NEXT_PUBLIC_COUPLE_MONOGRAM }}

          # ---- Date & Time ----
          NEXT_PUBLIC_WEDDING_DATE_ISO: ${{ vars.NEXT_PUBLIC_WEDDING_DATE_ISO }}
          NEXT_PUBLIC_WEDDING_DATE_DISPLAY: ${{ vars.NEXT_PUBLIC_WEDDING_DATE_DISPLAY }}
          NEXT_PUBLIC_WEDDING_DAY_DISPLAY: ${{ vars.NEXT_PUBLIC_WEDDING_DAY_DISPLAY }}
          NEXT_PUBLIC_WEDDING_TIME_DISPLAY: ${{ vars.NEXT_PUBLIC_WEDDING_TIME_DISPLAY }}

          # ---- Event ----
          NEXT_PUBLIC_EVENT_LABEL: ${{ vars.NEXT_PUBLIC_EVENT_LABEL }}

          # ---- Venue ----
          NEXT_PUBLIC_VENUE_NAME: ${{ vars.NEXT_PUBLIC_VENUE_NAME }}
          NEXT_PUBLIC_VENUE_ADDRESS: ${{ vars.NEXT_PUBLIC_VENUE_ADDRESS }}
          NEXT_PUBLIC_VENUE_MAPS_EMBED_SRC: ${{ vars.NEXT_PUBLIC_VENUE_MAPS_EMBED_SRC }}
          NEXT_PUBLIC_VENUE_MAPS_DIRECTIONS_URL: ${{ vars.NEXT_PUBLIC_VENUE_MAPS_DIRECTIONS_URL }}
          NEXT_PUBLIC_VENUE_DESCRIPTION: ${{ vars.NEXT_PUBLIC_VENUE_DESCRIPTION }}

          # ---- Envelope / Card ----
          NEXT_PUBLIC_INVITATION_LINE: ${{ vars.NEXT_PUBLIC_INVITATION_LINE }}
          NEXT_PUBLIC_CARD_LABEL: ${{ vars.NEXT_PUBLIC_CARD_LABEL }}
          NEXT_PUBLIC_TAP_TO_OPEN_TEXT: ${{ vars.NEXT_PUBLIC_TAP_TO_OPEN_TEXT }}

          # ---- Welcome ----
          NEXT_PUBLIC_WELCOME_SECTION_LABEL: ${{ vars.NEXT_PUBLIC_WELCOME_SECTION_LABEL }}
          NEXT_PUBLIC_WELCOME_QUOTE: ${{ vars.NEXT_PUBLIC_WELCOME_QUOTE }}
          NEXT_PUBLIC_WELCOME_PARAGRAPH: ${{ vars.NEXT_PUBLIC_WELCOME_PARAGRAPH }}

          # ---- Details ----
          NEXT_PUBLIC_DETAILS_SECTION_LABEL: ${{ vars.NEXT_PUBLIC_DETAILS_SECTION_LABEL }}
          NEXT_PUBLIC_DETAILS_SECTION_TITLE: ${{ vars.NEXT_PUBLIC_DETAILS_SECTION_TITLE }}
          NEXT_PUBLIC_DETAILS_DATE_LABEL: ${{ vars.NEXT_PUBLIC_DETAILS_DATE_LABEL }}
          NEXT_PUBLIC_DETAILS_VENUE_LABEL: ${{ vars.NEXT_PUBLIC_DETAILS_VENUE_LABEL }}

          # ---- Countdown ----
          NEXT_PUBLIC_COUNTDOWN_SECTION_LABEL: ${{ vars.NEXT_PUBLIC_COUNTDOWN_SECTION_LABEL }}
          NEXT_PUBLIC_COUNTDOWN_SECTION_TITLE: ${{ vars.NEXT_PUBLIC_COUNTDOWN_SECTION_TITLE }}
          NEXT_PUBLIC_COUNTDOWN_LABEL_DAYS: ${{ vars.NEXT_PUBLIC_COUNTDOWN_LABEL_DAYS }}
          NEXT_PUBLIC_COUNTDOWN_LABEL_HOURS: ${{ vars.NEXT_PUBLIC_COUNTDOWN_LABEL_HOURS }}
          NEXT_PUBLIC_COUNTDOWN_LABEL_MINUTES: ${{ vars.NEXT_PUBLIC_COUNTDOWN_LABEL_MINUTES }}
          NEXT_PUBLIC_COUNTDOWN_LABEL_SECONDS: ${{ vars.NEXT_PUBLIC_COUNTDOWN_LABEL_SECONDS }}

          # ---- Gallery ----
          NEXT_PUBLIC_GALLERY_SECTION_LABEL: ${{ vars.NEXT_PUBLIC_GALLERY_SECTION_LABEL }}
          NEXT_PUBLIC_GALLERY_SECTION_TITLE: ${{ vars.NEXT_PUBLIC_GALLERY_SECTION_TITLE }}
          NEXT_PUBLIC_GALLERY_CAPTIONS: ${{ vars.NEXT_PUBLIC_GALLERY_CAPTIONS }}
          NEXT_PUBLIC_GALLERY_IMAGES: ${{ vars.NEXT_PUBLIC_GALLERY_IMAGES }}

          # ---- Venue Section ----
          NEXT_PUBLIC_VENUE_SECTION_LABEL: ${{ vars.NEXT_PUBLIC_VENUE_SECTION_LABEL }}
          NEXT_PUBLIC_VENUE_SECTION_TITLE: ${{ vars.NEXT_PUBLIC_VENUE_SECTION_TITLE }}
          NEXT_PUBLIC_VENUE_DIRECTIONS_TEXT: ${{ vars.NEXT_PUBLIC_VENUE_DIRECTIONS_TEXT }}

          # ---- Blessings ----
          NEXT_PUBLIC_BLESSING_TITLE: ${{ vars.NEXT_PUBLIC_BLESSING_TITLE }}
          NEXT_PUBLIC_BLESSING_MESSAGE: ${{ vars.NEXT_PUBLIC_BLESSING_MESSAGE }}

          # ---- Music ----
          # Set to 1-10 → resolves to /songs/song{n}.mp3 at build time
          NEXT_PUBLIC_SELECTED_SONG: ${{ vars.NEXT_PUBLIC_SELECTED_SONG }}
          NEXT_PUBLIC_MUSIC_VOLUME: ${{ vars.NEXT_PUBLIC_MUSIC_VOLUME }}
          # Advanced: hard-code a path instead of using SELECTED_SONG
          NEXT_PUBLIC_MUSIC_FILE: ${{ vars.NEXT_PUBLIC_MUSIC_FILE }}

          # ---- SEO ----
          NEXT_PUBLIC_SITE_TITLE: ${{ vars.NEXT_PUBLIC_SITE_TITLE }}
          NEXT_PUBLIC_SITE_DESCRIPTION: ${{ vars.NEXT_PUBLIC_SITE_DESCRIPTION }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: anaghawedsanoop
          channelId: live
